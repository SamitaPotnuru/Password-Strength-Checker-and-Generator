<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Checker</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:360px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

.input-box{
position:relative;
}

input{
width:100%;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.toggle-btn{
position:absolute;
right:5px;
top:5px;
padding:5px 10px;
border:none;
background:#667eea;
color:white;
border-radius:5px;
cursor:pointer;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.buttons button{
padding:8px;
border:none;
background:#667eea;
color:white;
border-radius:6px;
cursor:pointer;
}

.buttons button:hover{
background:#5563d1;
}

.strength-bar{
height:10px;
background:#eee;
border-radius:5px;
margin-top:10px;
}

#strength-level{
height:10px;
width:0%;
border-radius:5px;
transition:0.3s;
}

#strength-text{
margin-top:10px;
font-weight:bold;
}

ul{
padding:0;
margin-top:15px;
}

ul li{
list-style:none;
font-size:14px;
margin:5px 0;
color:red;
}

.valid{
color:green;
}

</style>
</head>

<body>

<div class="container">

<h2>Password Strength Checker</h2>

<div class="input-box">
<input type="password" id="password" placeholder="Enter password">
<button class="toggle-btn" onclick="togglePassword()">Show</button>
</div>

<div class="buttons">
<button onclick="generatePassword()">Generate</button>
<button onclick="copyPassword()">Copy</button>
</div>

<div class="strength-bar">
<div id="strength-level"></div>
</div>

<div id="strength-text"></div>

<ul>
<li id="length">Minimum 8 characters</li>
<li id="upper">At least 1 uppercase letter</li>
<li id="lower">At least 1 lowercase letter</li>
<li id="number">At least 1 number</li>
<li id="special">At least 1 special character</li>
</ul>

</div>

<script>

const password = document.getElementById("password");

password.addEventListener("input", checkPassword);

function checkPassword(){

let value = password.value;
let score = 0;

if(value.length >= 8){
score++;
document.getElementById("length").classList.add("valid");
}else{
document.getElementById("length").classList.remove("valid");
}

if(/[A-Z]/.test(value)){
score++;
document.getElementById("upper").classList.add("valid");
}else{
document.getElementById("upper").classList.remove("valid");
}

if(/[a-z]/.test(value)){
score++;
document.getElementById("lower").classList.add("valid");
}else{
document.getElementById("lower").classList.remove("valid");
}

if(/[0-9]/.test(value)){
score++;
document.getElementById("number").classList.add("valid");
}else{
document.getElementById("number").classList.remove("valid");
}

if(/[^A-Za-z0-9]/.test(value)){
score++;
document.getElementById("special").classList.add("valid");
}else{
document.getElementById("special").classList.remove("valid");
}

updateStrength(score);

}

function updateStrength(score){

let bar = document.getElementById("strength-level");
let text = document.getElementById("strength-text");

if(score <= 2){
bar.style.width="33%";
bar.style.background="red";
text.innerHTML="Weak Password";
}

else if(score <=4){
bar.style.width="66%";
bar.style.background="orange";
text.innerHTML="Medium Password";
}

else{
bar.style.width="100%";
bar.style.background="green";
text.innerHTML="Strong Password";
}

}

function togglePassword(){

let pass = document.getElementById("password");

if(pass.type==="password"){
pass.type="text";
}else{
pass.type="password";
}

}

function generatePassword(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";

let pass="";

for(let i=0;i<12;i++){
pass+=chars.charAt(Math.floor(Math.random()*chars.length));
}

password.value=pass;

checkPassword();

}

function copyPassword(){

navigator.clipboard.writeText(password.value);
alert("Password Copied!");

}

</script>

</body>
</html>
